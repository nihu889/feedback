<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Palace | Restaurant</title>

    <style>

        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f5f5;
        }

        /* Header */
        header {
            background: #c0392b;
            color: white;
            text-align: center;
            padding: 25px;
        }

        /* Navigation */
        nav {
            background: #922b21;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 15px 20px;
            font-size: 16px;
        }

        nav a:hover {
            background: #e74c3c;
        }

        /* Hero Section */
        .hero {
            background: url("https://images.unsplash.com/photo-1555992336-03a23c0b3cfb") no-repeat center;
            background-size: cover;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        .hero h1 {
            background: rgba(0,0,0,0.6);
            padding: 15px 25px;
            border-radius: 5px;
        }

        /* Container */
        .container {
            padding: 30px;
        }

        /* Sections */
        .section {
            margin-bottom: 40px;
            text-align: center;
        }

        .section h2 {
            color: #c0392b;
            margin-bottom: 15px;
        }

        /* Menu */
        .menu {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .menu-item
